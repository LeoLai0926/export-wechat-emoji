name: release

# 仅通过 tag 触发构建和发布
on:
  push:
    tags:
      - 'v*' # 监听所有以 v 开头的 tag（如 v0.1.0）

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: macos-latest
            app_arch: arm64
            tauri_arch: aarch64
            build_cli: true
          - runner: macos-13
            app_arch: x64
            tauri_arch: x64
            build_cli: false

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 git 历史，包括 tag 信息

      # pnpm 版本会自动从 package.json 的 packageManager 字段读取
      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: build key dumper dylib (for app auto-dump)
        run: bash tools/wechat-key-dumper/build.sh

      - name: build extract-emoticon-urls helper binary (for tauri bundler)
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin extract-emoticon-urls --features dev-tools

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile
        id: install_frontend_dependencies
      - name: Clear pnpm cache on failure
        if: steps.install_frontend_dependencies.outcome == 'failure'
        run: |
          pnpm store prune
          pnpm install --no-frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }} # 密钥，需要提前配置在 Github Secrets中
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }} # 生成时填入的密码，没有则不填

        with:
          tagName: v__VERSION__ # tag的名称: v__VERSION__是指版本号
          releaseName: 导出微信表情包 + wxemoticon v__VERSION__
          releaseBody: |
            本版本同时发布 App 与 CLI：

            - macOS App（Apple Silicon）：wxemoticon-app-macos-arm64.dmg
            - macOS App（Intel）：wxemoticon-app-macos-x64.dmg
            - CLI：wxemoticon（aarch64 / x86_64）
            - 安装脚本：install-wxemoticon.sh

            CLI 安装：
            curl -fsSL https://raw.githubusercontent.com/liusheng22/export-wechat-emoji/main/scripts/install-wxemoticon.sh | bash

            CLI 常用命令：
            - wxemoticon key
            - wxemoticon urls
            - wxemoticon export
          releaseDraft: false
          prerelease: false

      - name: upload app assets with clear names (${{ matrix.app_arch }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          DMG_SRC="$(ls -1 src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          APP_SRC="$(ls -1 src-tauri/target/release/bundle/macos/*.app.tar.gz | head -n 1)"

          DMG_DST="wxemoticon-app-macos-${{ matrix.app_arch }}.dmg"
          APP_DST="wxemoticon-app-macos-${{ matrix.app_arch }}.app.tar.gz"

          cp "$DMG_SRC" "$DMG_DST"
          cp "$APP_SRC" "$APP_DST"

          gh release upload "$TAG" "$DMG_DST" "$APP_DST" --clobber

          DEFAULT_DMG="_${VERSION}_${{ matrix.tauri_arch }}.dmg"
          DEFAULT_APP="_${{ matrix.tauri_arch }}.app.tar.gz"

          for NAME in "$DEFAULT_DMG" "$DEFAULT_APP"; do
            ASSET_ID="$(gh release view "$TAG" --json assets --jq ".assets[] | select(.name==\"$NAME\") | .id" || true)"
            if [[ -n "${ASSET_ID}" ]]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" || true
            fi
          done

      - name: build wxemoticon cli (arm64 + x86_64)
        if: matrix.build_cli
        run: |
          set -euo pipefail
          rustup target add x86_64-apple-darwin
          cargo build --manifest-path cli/Cargo.toml --release
          cargo build --manifest-path cli/Cargo.toml --release --target x86_64-apple-darwin
          tar -czf wxemoticon-aarch64-apple-darwin.tar.gz -C cli/target/release wxemoticon
          tar -czf wxemoticon-x86_64-apple-darwin.tar.gz -C cli/target/x86_64-apple-darwin/release wxemoticon
          shasum -a 256 wxemoticon-*.tar.gz > wxemoticon-SHA256SUMS.txt

      - name: upload wxemoticon cli assets
        if: matrix.build_cli
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            wxemoticon-aarch64-apple-darwin.tar.gz
            wxemoticon-x86_64-apple-darwin.tar.gz
            wxemoticon-SHA256SUMS.txt
            scripts/install-wxemoticon.sh
